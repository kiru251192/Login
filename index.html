<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="login-container">
    <h2>Login</h2>
    <form id="loginForm" novalidate>
        <label for="username">Email or Phone</label>
        <input type="text" id="username" name="username" placeholder="you@example.com or 123-456-7890" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>

        <button type="submit">Sign In</button>
    </form>
    <p id="errorMsg" class="error" style="color:#c00; font-size:.9rem; display:none; margin-top:1rem;"></p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const errorEl = document.getElementById('errorMsg');
        errorEl.style.display = 'none';

        if (!user || !pass) {
            errorEl.textContent = 'Both fields are required';
            errorEl.style.display = 'block';
            return;
        }

        // simple validation for email or phone
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        const phoneRegex = /^\+?[0-9\- ]{7,15}$/;
        if (!emailRegex.test(user) && !phoneRegex.test(user)) {
            errorEl.textContent = 'Enter a valid email address or phone number';
            errorEl.style.display = 'block';
            return;
        }

        // send login data to server
        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                alert('Login stored successfully.');
                // optionally redirect or clear form
                document.getElementById('loginForm').reset();
            } else {
                errorEl.textContent = data.error || 'Server error';
                errorEl.style.display = 'block';
            }
        })
        .catch(err => {
            errorEl.textContent = 'Network error';
            errorEl.style.display = 'block';
            console.error(err);
        });
    });
</script>
</body>
</html>
